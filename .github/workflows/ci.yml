name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run test suite
        env:
          WORKSPACE: ${{ github.workspace }}
          SANDBOX_ENV: devcontainer
        run: .sandbox/scripts/run-all-tests.sh
